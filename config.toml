# The URL the site will be built for
base_url = "https://nickscip.xyz"
theme = "duckquill"
title = "My Blog"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true
minify_html = true
generate_feeds = true
feed_filenames = ["rss.xml"]

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

default_language = "en"
taxonomies = [{ name = "tags", feed = true }]

[markdown]
smart_punctuation = true

[markdown.highlighting]
theme = "Monokai"

[search]
index_format = "elasticlunr_json"

[extra]
styles = ["custom.css"]
# Theme accent color
accent_color = "#ff7800"
accent_color_dark = "#ffa348"

# Show copy button on code blocks
show_copy_button = true
# Show estimated read time in posts
show_reading_time = true

[[extra.record_collection]]
album = "The Fall Off"
artist = "J. Cole"
year = "2026"
fav_song = "Quik Stop"
spotify_track_id = "050ECC7Yu78pTJP8PrMo8o"
cover = "/fall_off.jpg"
blurb = "Cole pens a strong collection of tracks alongside a few skips on this overhyped yet career-best double album."

[[extra.record_collection]]
album = "RAM"
artist = "Paul and Linda McCartney"
year = "1971"
fav_song = "Heart of the Country"
spotify_track_id = "0xRaZsAPZzGhO9x46cnA1W"
cover = "/RamMcCartneyalbumcover.jpg"
blurb = "Nothing in our modern world bests singing with a horse and a sheep"

[[extra.record_collection]]
album = "Ca$ino"
artist = "Baby Keem"
year = "2026"
fav_song = "I Am Not a Lyricist"
spotify_track_id = "76uwSqRmmSfRZVocIceH1b"
cover = "/Baby_Keem_-_Casino.png"
blurb = "When people ask why I'm from Vegas and don't gamble, showing them this."

[extra.nav]
# Show the Atom/RSS feed button in the nav
show_feed = true
# Show the manual theme switcher in the nav
show_theme_switcher = true
# Navigation links
links = [
    { url = "@/blog/_index.md", name = "Blog" },
    { url = "@/projects/_index.md", name = "Projects" }
]

[extra.footer]
# Footer links
links = [
    { url = "@/blog/_index.md", name = "Blog" }
]
# Show "© Title, YEAR"
show_copyright = true
# Show "Powered by Zola and Duckquill"
show_powered_by = true
